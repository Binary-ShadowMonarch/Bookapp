worker_processes auto;
events {
    worker_connections 1024;
}

http {
    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Hide nginx version
    server_tokens off;
    
    # Rate limiting
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=general:10m rate=50r/m;
    
    # File size limits
    client_max_body_size 10M;
    client_body_buffer_size 128k;
    
    # Timeouts
    client_body_timeout 12;
    client_header_timeout 12;
    keepalive_timeout 15;
    send_timeout 10;
    
    # Define upstream for the Go backend
    upstream backend {
        server backend:8080;
    }
    
    # Define upstream for the SvelteKit frontend  
    upstream frontend {
        server frontend:3000;
    }
    
    server {
        listen 80;
        
        # Only allow requests from your domain
        if ($host !~* ^(books\.saurabpoudel\.com\.np|localhost)$) {
            return 444;
        }
        
        # Block access to sensitive files
        location ~* /\.(env|git|svn|htaccess|htpasswd) {
            deny all;
            return 404;
        }
        
        location ~* \.(sql|log|bak|backup|old|tmp)$ {
            deny all;
            return 404;
        }
        
        # Block common attack patterns
        location ~* (wp-admin|wp-content|wp-includes|xmlrpc.php|phpmyadmin) {
            return 444;
        }
        
        # Auth endpoints with strict rate limiting
        location ~* ^/api/(login|signup|auth) {
            limit_req zone=login burst=3 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # API routes with moderate rate limiting
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # Frontend routes with general rate limiting
        location / {
            limit_req zone=general burst=10 nodelay;
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
        }
    }
}